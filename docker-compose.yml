x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck: &backend-healthcheck
  test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/v1/health', timeout=5)"]
  interval: 15s
  timeout: 5s
  start_period: 30s
  retries: 5

x-restart: &restart-policy
  restart: unless-stopped

x-labels: &default-labels
  app: "machine-guru"
  managed-by: "docker-compose"

# ─────────────────────────────────────────────────────────────
# IMPORTANT — Jetson Orin Docker Notes:
#
#   Ollama: The official ollama/ollama Docker image does NOT
#   support NVIDIA Jetson CUDA. For GPU acceleration on Jetson,
#   install Ollama natively: ./deploy/jetson_setup.sh
#   Then run the stack WITHOUT the ollama service:
#     docker compose up backend frontend qdrant -d
#
#   PyTorch: The backend image uses python:3.12-slim which does
#   NOT include Jetson CUDA. For GPU-accelerated embedding on
#   Jetson, use the native deployment flow (start.sh) instead
#   of Docker for the backend.
#
#   Recommended Jetson deployment: ./deploy/install.sh + ./start.sh
# ─────────────────────────────────────────────────────────────

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: machine-guru-backend
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    env_file:
      - .env
    environment:
      # Override Docker-specific values that differ from native .env
      - DEVICE=${DEVICE:-cpu}
      - USE_FP16=${USE_FP16:-false}
      - USE_FLASH_ATTENTION=${USE_FLASH_ATTENTION:-false}
      # Inside Docker, use service names as hostnames
      - OLLAMA_BASE_URL=${DOCKER_OLLAMA_URL:-http://ollama:11434}
      - QDRANT_HOST=qdrant
      - JSON_LOGGING=${JSON_LOGGING:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - UPLOAD_DIR=/app/storage/uploads
      - LOG_DIR=/app/logs
    volumes:
      - ./storage/uploads:/app/storage/uploads
      - ./logs:/app/logs
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck: *backend-healthcheck
    networks:
      - machine-guru-network
    <<: *restart-policy
    labels:
      <<: *default-labels
      component: "backend"
      description: "FastAPI RAG backend"
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 1G
    logging: *default-logging

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: machine-guru-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - machine-guru-network
    <<: *restart-policy
    labels:
      <<: *default-labels
      component: "frontend"
      description: "Nginx reverse proxy + static assets"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M
        reservations:
          cpus: "0.5"
          memory: 128M
    logging: *default-logging

  qdrant:
    # qdrant/qdrant supports linux/arm64 — works on Jetson.
    image: qdrant/qdrant:v1.13.2
    container_name: machine-guru-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"
    volumes:
      # Mount host storage/qdrant/ for persistence visible outside Docker
      - ./storage/qdrant:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=${QDRANT_LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - machine-guru-network
    <<: *restart-policy
    labels:
      <<: *default-labels
      component: "qdrant"
      description: "Vector database"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging: *default-logging

  ollama:
    # NOTE: ollama/ollama Docker image does NOT support Jetson CUDA.
    # On Jetson Orin: install Ollama natively via deploy/jetson_setup.sh
    # and remove the ollama service from this file.
    # On x86_64 development machines: this image works normally.
    image: ollama/ollama:latest
    container_name: machine-guru-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-2}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-300s}
      - OLLAMA_DEBUG=${OLLAMA_DEBUG:-0}
    healthcheck:
      test: ["CMD", "sh", "-c", "ollama list 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - machine-guru-network
    <<: *restart-policy
    labels:
      <<: *default-labels
      component: "ollama"
      description: "LLM inference server (x86_64 only — use native on Jetson)"
    logging: *default-logging

volumes:
  ollama_models:
    name: machine-guru-ollama-models

networks:
  machine-guru-network:
    name: machine-guru-network
    driver: bridge
