global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "machine-guru-backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: "/metrics"
    scrape_interval: 10s
    scheme: http
    basic_auth: null
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "machine-guru-backend"
      - source_labels: [__address__]
        target_label: service
        replacement: "machine-guru"

  - job_name: "qdrant"
    static_configs:
      - targets: ["qdrant:6333"]
    metrics_path: "/metrics"
    scrape_interval: 15s
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: "qdrant"

  - job_name: "ollama"
    static_configs:
      - targets: ["ollama:11434"]
    metrics_path: "/api/metrics"
    scrape_interval: 15s
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: "ollama"
