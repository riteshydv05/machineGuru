x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck: &backend-healthcheck
  test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
  interval: 15s
  timeout: 5s
  start_period: 30s
  retries: 5

x-restart: &restart-policy
  restart: unless-stopped

x-labels: &default-labels
  app: "machine-guru"
  managed-by: "docker-compose"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: machine-guru-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DEVICE=${DEVICE:-cpu}
      - USE_FP16=${USE_FP16:-false}
      - USE_FLASH_ATTENTION=${USE_FLASH_ATTENTION:-false}
      - OLLAMA_BASE_URL=http://ollama:11434
      - JSON_LOGGING=${JSON_LOGGING:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck: *backend-healthcheck
    networks:
      - machine-guru-network
    <<: *restart-policy
    labels:
      <<: *default-labels
      component: "backend"
      description: "FastAPI RAG backend"
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 1G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    logging: *default-logging

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: machine-guru-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - machine-guru-network
    <<: *restart-policy
    labels:
      <<: *default-labels
      component: "frontend"
      description: "Nginx reverse proxy + static assets"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M
        reservations:
          cpus: "0.5"
          memory: 128M
    logging: *default-logging

  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: machine-guru-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=${QDRANT_LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - machine-guru-network
    <<: *restart-policy
    labels:
      <<: *default-labels
      component: "qdrant"
      description: "Vector database"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging: *default-logging

  ollama:
    image: ollama/ollama:0.4.7
    container_name: machine-guru-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-2}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-300s}
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_GPU_OVERLAP=1
      - OLLAMA_KV_CACHE_TYPE=q8_0
      - OLLAMA_DEBUG=${OLLAMA_DEBUG:-0}
    healthcheck:
      test: ["CMD", "sh", "-c", "ollama list 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
        reservations:
          cpus: "1"
          memory: 1G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - machine-guru-network
    <<: *restart-policy
    labels:
      <<: *default-labels
      component: "ollama"
      description: "LLM inference server"
    logging: *default-logging

volumes:
  qdrant_storage:
    name: machine-guru-qdrant-storage
  ollama_models:
    name: machine-guru-ollama-models
  uploads:
    name: machine-guru-uploads

networks:
  machine-guru-network:
    name: machine-guru-network
    driver: bridge
